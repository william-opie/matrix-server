services:
  config-renderer:
    image: python:3.14-slim
    container_name: matrix-config-renderer
    volumes:
      - ./:/workspace
    working_dir: /workspace
    env_file:
      - .env
    command: ["python", "scripts/render_configs.py"]
    restart: "no"

  postgres:
    image: postgres:16
    container_name: matrix-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: "--locale=C --encoding=UTF8"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [matrix]
    depends_on:
      config-renderer:
        condition: service_completed_successfully

  synapse:
    image: ghcr.io/element-hq/synapse:v1.151.0
    container_name: matrix-synapse
    entrypoint: ["/bin/sh", "-c", "chown -R 991:991 /data && exec /start.py"]
    depends_on:
      postgres:
        condition: service_healthy
      config-renderer:
        condition: service_completed_successfully
    volumes:
      - ./runtime/synapse:/data
    healthcheck:
      test: ["CMD", "curl", "-fSs", "http://localhost:8008/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped
    networks: [matrix]

  matrix-bootstrap:
    image: python:3.14-slim
    container_name: matrix-bootstrap
    env_file:
      - .env
    depends_on:
      synapse:
        condition: service_healthy
      config-renderer:
        condition: service_completed_successfully
    volumes:
      - ./:/workspace
      - ./data/bootstrap:/state
    working_dir: /workspace
    command: ["python", "scripts/bootstrap_matrix.py"]
    restart: on-failure
    networks: [matrix]

  coturn:
    image: instrumentisto/coturn:latest
    container_name: matrix-coturn
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "49160-49200:49160-49200/udp"
    environment:
      TURN_SECRET: ${TURN_SECRET}
      TURN_REALM: ${TURN_REALM}
    command: >
      -n
      --log-file=stdout
      --use-auth-secret
      --static-auth-secret=${TURN_SECRET}
      --realm=${TURN_REALM}
      --lt-cred-mech
      --fingerprint
      --no-multicast-peers
      --no-cli
      --min-port=49160
      --max-port=49200
    restart: unless-stopped
    networks: [matrix]

  element:
    image: vectorim/element-web:latest
    container_name: matrix-element
    depends_on:
      config-renderer:
        condition: service_completed_successfully
    volumes:
      - ./runtime/element/config.json:/app/config.json:ro
    restart: unless-stopped
    networks: [matrix]

  web:
    image: nginx:alpine
    container_name: matrix-web
    depends_on: [synapse, element]
    ports:
      - "127.0.0.1:${ELEMENT_HTTP_PORT}:80"
    volumes:
      - ./runtime/nginx/matrix.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks: [matrix]

  # Element Call self-hosted stack (LiveKit + Element Call web).
  redis:
    image: redis:8-alpine
    container_name: matrix-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - ./data/redis:/data
    restart: unless-stopped
    networks: [matrix]

  livekit:
    image: livekit/livekit-server:latest
    container_name: matrix-livekit
    network_mode: host
    command: ["--config", "/etc/livekit.yaml"]
    volumes:
      - ./runtime/livekit/livekit.yaml:/etc/livekit.yaml:ro
    depends_on:
      config-renderer:
        condition: service_completed_successfully
      redis:
        condition: service_started
    restart: unless-stopped

  element-call:
    image: ghcr.io/element-hq/element-call:latest
    container_name: matrix-element-call
    depends_on:
      livekit:
        condition: service_started
      config-renderer:
        condition: service_completed_successfully
    volumes:
      - ./runtime/element-call/config.json:/app/config.json:ro
    restart: unless-stopped
    networks: [matrix]

  livekit-jwt:
    image: ghcr.io/element-hq/lk-jwt-service:latest
    container_name: matrix-livekit-jwt
    env_file:
      - .env
    environment:
      LIVEKIT_URL: ${LIVEKIT_SFU_URL}
      LIVEKIT_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_SECRET: ${LIVEKIT_API_SECRET}
      LIVEKIT_FULL_ACCESS_HOMESERVERS: ${MATRIX_SERVER_NAME}
    depends_on:
      synapse:
        condition: service_healthy
      livekit:
        condition: service_started
    restart: unless-stopped
    networks: [matrix]

  element-call-web:
    image: nginx:alpine
    container_name: matrix-element-call-web
    depends_on:
      element-call:
        condition: service_started
      livekit-jwt:
        condition: service_started
      livekit:
        condition: service_started
      config-renderer:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:${ELEMENT_CALL_HTTP_PORT}:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./runtime/nginx/element-call.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks: [matrix]

  admin-api:
    image: python:3.14-slim
    container_name: matrix-admin-api
    env_file:
      - .env
    working_dir: /workspace/admin-api
    volumes:
      - ./:/workspace
      - ./data/admin-api:/data
    command: ["/bin/sh", "-c", "pip install --no-cache-dir -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 9000"]
    depends_on:
      synapse:
        condition: service_healthy
      matrix-bootstrap:
        condition: service_completed_successfully
    restart: unless-stopped
    networks: [matrix]

  admin-ui:
    image: nginx:alpine
    container_name: matrix-admin-ui
    depends_on:
      admin-api:
        condition: service_started
    ports:
      - "127.0.0.1:${ADMIN_UI_HTTP_PORT}:80"
    volumes:
      - ./admin-ui:/usr/share/nginx/html:ro
      - ./runtime/nginx/admin-ui.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks: [matrix]

networks:
  matrix:
    driver: bridge
